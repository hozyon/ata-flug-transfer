<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Flug Transfer | Antalya VIP Havalimanı Transfer</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c5a059">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #c5a059;
            --brand-dark: #0f172a;
            --brand-darker: #020617;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        html,
        body {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
            overflow-x: hidden !important;
            /* Prevent horizontal scroll */
            width: 100%;
            position: relative;
            max-width: 100vw;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        .bg-gold {
            background-color: var(--brand-gold);
        }

        .text-gold {
            color: var(--brand-gold);
        }

        .border-gold {
            border-color: var(--brand-gold);
        }

        /* Glassmorphism Utilities */
        .glass-dark {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .glass-panel {
            background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .booking-card {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-top: 4px solid var(--brand-gold);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .nav-link::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: var(--brand-gold);
            transition: width .3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c5a059;
            border-radius: 10px;
        }

        /* === 2026 UI TRENDS === */

        /* Scroll-Snap Carousel */
        .carousel-container {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .carousel-container::-webkit-scrollbar {
            display: none;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex-shrink: 0;
        }

        /* Glassmorphism Card */
        .glass-card-2026 {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card-2026:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(197, 160, 89, 0.4);
            box-shadow: 0 0 30px -5px rgba(197, 160, 89, 0.15), 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            transform: translateY(-6px);
        }

        /* Glow Pulse Border */
        @keyframes glow-pulse {

            0%,
            100% {
                box-shadow: 0 0 15px -3px rgba(197, 160, 89, 0.15);
            }

            50% {
                box-shadow: 0 0 25px -3px rgba(197, 160, 89, 0.3);
            }
        }

        .glow-active {
            animation: glow-pulse 3s ease-in-out infinite;
        }

        /* Carousel nav buttons */
        .carousel-nav-btn {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .carousel-nav-btn:hover {
            background: rgba(197, 160, 89, 0.2);
            border-color: rgba(197, 160, 89, 0.5);
            transform: scale(1.1);
        }

        .carousel-nav-btn:active {
            transform: scale(0.95);
        }

        /* Drag cursor */
        .cursor-grab {
            cursor: grab;
        }

        .cursor-grab:active {
            cursor: grabbing;
        }

        /* Dual Row Marquee — GPU accelerated */
        @keyframes marquee-row1 {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-50%, 0, 0);
            }
        }

        @keyframes marquee-row2 {
            0% {
                transform: translate3d(-50%, 0, 0);
            }

            100% {
                transform: translate3d(0, 0, 0);
            }
        }

        .marquee-row-1 {
            animation: marquee-row1 80s linear infinite;
            width: max-content;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .marquee-row-2 {
            animation: marquee-row2 90s linear infinite;
            width: max-content;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .marquee-row-1:hover,
        .marquee-row-2:hover {
            animation-play-state: paused;
        }

        /* Review Card 2026 — contained for performance */
        .review-card-2026 {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            contain: layout style paint;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .review-card-2026:hover {
            border-color: rgba(197, 160, 89, 0.35);
            box-shadow: 0 0 24px -5px rgba(197, 160, 89, 0.15);
        }

        /* Dot Indicator */
        .dot-indicator {
            transition: all 0.3s ease;
        }

        .dot-indicator.active {
            background: #c5a059;
            width: 24px;
            border-radius: 9999px;
        }

        /* Stagger fade-in */
        @keyframes stagger-in {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stagger-animate>* {
            animation: stagger-in 0.5s ease-out both;
        }
    </style>
    <link rel="stylesheet" href="/src/index.css">
</head>

<body class="text-slate-900">
    <div id="root"></div>

    <script type="module" src="/src/index.tsx"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => { });
            });
        }
    </script>
</body>

</html>
